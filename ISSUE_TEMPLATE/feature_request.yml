name: Feature Request
description: Suggest an idea for DriveBy Studios
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the feature and why do we need it?
      placeholder: Describe your idea...
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Performance Impact
      description: How does this align with our high-performance philosophy?
