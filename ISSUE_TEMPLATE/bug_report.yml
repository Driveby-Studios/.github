name: Bug Report
description: Report a bug for DriveBy Studios projects
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: 1. Do X... 2. See Y...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Compiler, GPU/Driver version (Crucial for Vulkan/Graphics).
    validations:
      required: true
